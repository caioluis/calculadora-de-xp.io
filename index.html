<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Age - Calculadora de XP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-hover: #f9ce48;
            --bg-dark: #080808;
            --card-bg: #101010;
            --input-bg: #050505;
            --border: rgba(255,255,255,0.08);
            --text-main: #e0e0e0;
            --text-muted: #666;
            --success: #4caf50;
            --danger: #ff5252;
            --jjk-blue: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- HEADER --- */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            padding: 15px 25px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: border-color 0.3s;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .brand-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .save-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.5s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .save-indicator.visible { opacity: 1; }
        .save-indicator span { color: var(--gold); }

        .global-stats {
            text-align: right;
            border-left: 1px solid var(--border);
            padding-left: 20px;
        }
        
        .global-stats span {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .global-stats strong {
            font-size: 1.4rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* --- COLUNAS --- */
        .columns-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 30px;
        }

        .attr-col-header {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .attr-badge {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 4px;
            color: #888;
        }

        /* --- CARD DA APTIDÃO --- */
        .apt-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        .apt-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Topo do Card */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .apt-name {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .apt-bonus {
            font-size: 0.85rem;
            color: var(--gold);
            display: block;
        }

        .apt-lvl-display {
            text-align: right;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .lvl-label { font-size: 0.65rem; text-transform: uppercase; color: #666; display: block;}
        
        .lvl-value-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lvl-value { font-size: 1.2rem; font-weight: bold; color: #fff; font-family: 'Cinzel', serif; }

        .btn-levelup {
            background: var(--jjk-blue);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: bold;
            padding: 2px 6px;
            cursor: pointer;
            opacity: 0.8;
            transition: all 0.2s;
        }
        .btn-levelup:hover { opacity: 1; transform: scale(1.1); }

        /* Progresso */
        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .missing-xp {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* Inputs */
        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .input-wrapper { position: relative; }

        .input-label {
            position: absolute;
            top: -6px;
            left: 8px;
            background: #151515;
            padding: 0 4px;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 2px;
            z-index: 2;
        }

        .styled-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .styled-input:focus { border-color: var(--gold); }

        .add-group { display: flex; gap: 5px; }

        .btn-confirm {
            background: var(--gold);
            border: none;
            border-radius: 5px;
            width: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .btn-confirm:hover { background: var(--gold-hover); transform: scale(1.05); }
        .btn-confirm:active { transform: scale(0.95); }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #151515; border: 1px solid var(--gold); box-shadow: 0 0 30px var(--gold-glow);
            padding: 30px; width: 90%; max-width: 450px; border-radius: 8px; text-align: center;
        }
        .modal-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.5em; margin-bottom: 10px; }
        .modal-text { color: var(--text-main); margin-bottom: 25px; }
        .modal-actions { display: flex; justify-content: center; gap: 15px; }
        
        .btn-modal { padding: 10px 20px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; text-transform: uppercase; }
        .btn-modal-ok { background: var(--success); color: #000; }
        .btn-modal-cancel { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-modal-confirm { background: var(--gold); color: #000; }

        /* Efeitos */
        @keyframes flashGold {
            0% { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
            100% { border-color: #333; box-shadow: none; }
        }

        .flash-effect { animation: flashGold 0.8s ease-out; }

        /* Buffed/Nerfed card borders */
        .apt-card.buffed { border-left: 3px solid var(--success); background: rgba(76, 175, 80, 0.03); }
        .apt-card.nerfed { border-left: 3px solid var(--danger); background: rgba(255, 82, 82, 0.03); }

        /* Modifier tags */
        .apt-mods-area {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 0.7rem;
            min-height: 4px;
        }
        .mod-tag {
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .mod-tag.positive { color: var(--success); border: 1px solid rgba(76, 175, 80, 0.3); background: rgba(76, 175, 80, 0.06); }
        .mod-tag.negative { color: var(--danger); border: 1px solid rgba(255, 82, 82, 0.3); background: rgba(255, 82, 82, 0.06); }

        /* Modifiers Panel */
        .traits-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 25px;
            margin-bottom: 30px;
        }
        .traits-panel-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .mod-section-label {
            width: 100%;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .mod-section-label + .mod-section-label { margin-top: 12px; }
        .modifiers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-start;
        }
        .mod-toggle {
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            user-select: none;
            min-width: 0;
        }
        .mod-toggle:hover { border-color: #444; color: var(--text-main); }
        .mod-toggle .t-name { font-weight: 600; font-size: 0.85rem; color: #bbb; transition: color 0.2s; }
        .mod-toggle .t-effect { font-size: 0.7rem; color: #555; transition: color 0.2s; }

        .mod-toggle.active.type-pos { border-color: var(--success); background: rgba(76, 175, 80, 0.1); }
        .mod-toggle.active.type-pos .t-name { color: var(--success); }
        .mod-toggle.active.type-pos .t-effect { color: rgba(76, 175, 80, 0.65); }

        .mod-toggle.active.type-neg { border-color: var(--danger); background: rgba(255, 82, 82, 0.1); }
        .mod-toggle.active.type-neg .t-name { color: var(--danger); }
        .mod-toggle.active.type-neg .t-effect { color: rgba(255, 82, 82, 0.65); }

        @media (max-width: 768px) {
            .columns-wrapper { grid-template-columns: 1fr; }
            .sticky-header { flex-direction: column; gap: 15px; text-align: center; }
            .global-stats { border-left: none; text-align: center; padding: 0; }
            .header-left { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="save-indicator" id="saveInd" style="position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; z-index: 1000; opacity: 0; transition: opacity 0.5s; pointer-events: none;">Salvo</div>

    <div class="modal-overlay" id="customModal">

            <h3 class="modal-title" id="modalTitle">Aviso</h3>
            <p class="modal-text" id="modalText">Mensagem.</p>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <div class="main-container">

                    <span>Destreza</span>
                    <span class="attr-badge">DES</span>

            <div class="col">

        // === MODAL LOGIC ===
        const modalOverlay = document.getElementById("customModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalText = document.getElementById("modalText");
        const modalActions = document.getElementById("modalActions");

        function closeModal() { modalOverlay.classList.remove("active"); }

        function showAlert(title, text) {
            modalTitle.textContent = title;
            modalText.textContent = text;
            modalActions.innerHTML = `<button class="btn-modal btn-modal-ok" onclick="closeModal()">OK</button>`;
            modalOverlay.classList.add("active");
        }

        function showConfirm(title, text, callback) {
            modalTitle.textContent = title;
            modalText.textContent = text;
            modalActions.innerHTML = "";
            
            const btnCancel = document.createElement("button");
            btnCancel.className = "btn-modal btn-modal-cancel";
            btnCancel.textContent = "Cancelar";
            btnCancel.onclick = closeModal;

            const btnConfirm = document.createElement("button");
            btnConfirm.className = "btn-modal btn-modal-confirm";
            btnConfirm.textContent = "Confirmar";
            btnConfirm.style.marginLeft = "10px";
            btnConfirm.onclick = () => {
                callback();
                closeModal();
            };

            modalActions.appendChild(btnCancel);
            modalActions.appendChild(btnConfirm);
            modalOverlay.classList.add("active");

                { n: "Feitiços", m: 25, u: "pod/res", id: "apt-feiticos", type: "INT" },
                { n: "Barreiras", m: 25, u: "res", id: "apt-barreiras", type: "INT" },
                { n: "Vontade", m: 30, u: "res", id: "apt-vontade", type: "INT" },
                { n: "Manipulação", m: 1, u: "persuasão e mentira", id: "apt-manipulacao", type: "INT" },
                { n: "Percepção Mágica", m: 5, u: "m", id: "apt-percepcao-magica", type: "INT" },
                { n: "Primeiros Socorros", m: 30, u: "HP", id: "apt-primeiros-socorros", type: "INT" },
                { n: "Percepção Visual", m: 2, u: "m", id: "apt-percepcao-visual", type: "INT" },
                { n: "Pactos", special: "pactos", id: "apt-pactos", type: "INT" },
                { n: "Sobrevivência", special: "recursos", id: "apt-sobrevivencia", type: "INT" },
                { n: "Técnica Reversa", special: "rct", id: "apt-tecnica-reversa", type: "INT" }
            ]
        };

        // === INICIALIZAÇÃO ===
        const uidToApt = {};

        window.onload = function() {
            renderModifiers();
            renderSection('container-for', aptitudes.for);
            renderSection('container-des', aptitudes.des);
            renderSection('container-int', aptitudes.int);
            loadData();
        };

        function renderSection(containerId, list) {
            const container = document.getElementById(containerId);

            list.forEach((item, index) => {
                const uid = item.n.replace(/[^a-zA-Z0-9]/g, '') + index;
                uidToApt[uid] = { id: item.id, type: item.type };

                const card = document.createElement('div');
                card.className = 'apt-card';
                card.innerHTML = `
                    <div class="card-top">
                        <div>
                            <div class="apt-name">${item.n}</div>
                            <span class="apt-bonus" id="bonus-${uid}">Bônus: 0</span>
                        </div>
                        <div class="apt-lvl-display">
                            <span class="lvl-label">Nível</span>
                            <div class="lvl-value-row">
                                <div class="lvl-value" id="lvl-${uid}">0</div>
                                <button class="btn-levelup" onclick="confirmLevelUp('${uid}', '${item.n}')" title="Subir 1 Nível">+1</button>
                            </div>
                        </div>
                    </div>

                    <div class="apt-mods-area" id="mods-${uid}"></div>

                    <div class="progress-section">
                        <div class="progress-track">
                            <div class="progress-fill" id="bar-${uid}"></div>
                        </div>
                        <div class="missing-xp" id="next-${uid}">Próximo: 200 XP</div>
                    </div>

                    <div class="card-actions">
                        <div class="input-wrapper">
                            <label class="input-label">Acumulado</label>
                            <input type="number" class="styled-input input-current save-target" id="cur-${uid}" data-uid="${uid}" placeholder="0" oninput="updateCard('${uid}')">
                        </div>
                        <div class="input-wrapper add-group">
                            <label class="input-label">Novo XP</label>
                            <input type="number" class="styled-input input-new" id="new-${uid}" placeholder="0" oninput="tempCalc('${uid}')" onkeydown="checkEnter(event, '${uid}')">
                            <button class="btn-confirm" onclick="applyXP('${uid}')" title="Confirmar e Somar">✔</button>
                        </div>
                    </div>
                `;

                card.dataset.meta = JSON.stringify(item);
                container.appendChild(card);
            });
        }

        // === MODIFIERS PANEL ===
        function renderModifiers() {
            const grid = document.getElementById('modifiers-grid');
            const pos = MODIFIERS_DB.filter(m => m.type === 'pos');
            const neg = MODIFIERS_DB.filter(m => m.type === 'neg');

            let html = '<div class="mod-section-label">Vantagens</div>';
            pos.forEach(mod => {
                html += `<button class="mod-toggle type-pos" data-mod-id="${mod.id}" onclick="toggleModifier(this)"><span class="t-name">${mod.name}</span><span class="t-effect">${mod.effect}</span></button>`;
            });
            html += '<div class="mod-section-label">Desvantagens</div>';
            neg.forEach(mod => {
                html += `<button class="mod-toggle type-neg" data-mod-id="${mod.id}" onclick="toggleModifier(this)"><span class="t-name">${mod.name}</span><span class="t-effect">${mod.effect}</span></button>`;
            });
            grid.innerHTML = html;
        }

        function toggleModifier(btn) {
            btn.classList.toggle('active');
            recalcAllCards();
        }

        function getActiveModifiers() {
            let ar = [];
            document.querySelectorAll('.mod-toggle.active').forEach(btn => {
                const mod = MODIFIERS_DB.find(m => m.id === btn.dataset.modId);
                if (mod) mod.rules.forEach(r => ar.push({ ...r, sn: mod.name }));
            });
            return ar;
        }

        function getAptitudeMultiplier(uid) {
            const aptData = uidToApt[uid];
            if (!aptData) return { mult: 1.0, tags: [] };

            const rules = getActiveModifiers();
            let mult = 1.0;
            let tags = [];

            rules.forEach(r => {
                if (r.ty === 'GLOBAL' || (r.ty === 'TYPE' && r.tg === aptData.type) || (r.ty === 'ID' && r.tg === aptData.id)) {
                    mult *= r.m;
                    const p = Math.round(Math.abs(1 - r.m) * 100);
                    tags.push({ txt: r.m < 1 ? `${r.sn}: -${p}%` : `${r.sn}: +${p}%`, cls: r.m < 1 ? "positive" : "negative" });
                }
            });

            return { mult, tags };
        }

        function recalcAllCards() {
            document.querySelectorAll('.input-current').forEach(inp => {
                const uid = inp.dataset.uid;
                if (uid) updateCard(uid, false, true);
            });
            updateGlobalTotal();
            saveData();
        }

        // === STORAGE (CACHE) ===
        function saveData() {
            const data = {};
            document.querySelectorAll('.save-target').forEach(input => {
                data[input.id] = input.value;
            });

            const activeToggles = [];
            document.querySelectorAll('.mod-toggle.active').forEach(btn => activeToggles.push(btn.dataset.modId));
            data['_activeModifiers'] = JSON.stringify(activeToggles);

            localStorage.setItem('ga_aptitudes_v3', JSON.stringify(data));

            const ind = document.getElementById('saveInd');
            ind.classList.add('visible');
            setTimeout(() => ind.classList.remove('visible'), 2000);
        }

        function loadData() {
            const saved = localStorage.getItem('ga_aptitudes_v3');
            if (saved) {
                const data = JSON.parse(saved);

                if (data['_activeModifiers']) {
                    const active = JSON.parse(data['_activeModifiers']);
                    active.forEach(modId => {
                        const btn = document.querySelector(`.mod-toggle[data-mod-id="${modId}"]`);
                        if (btn) btn.classList.add('active');
                    });
                }

                for (const [id, val] of Object.entries(data)) {
                    if (id.startsWith('_')) continue;
                    const el = document.getElementById(id);
                    if (el) {
                        el.value = val;
                        const uid = el.dataset.uid;
                        if (uid) updateCard(uid, false, true);
                    }
                }
                updateGlobalTotal();
            }
        }

        // === LÓGICA DE UPDATE ===

        function tempCalc(uid) { updateCard(uid, true); }

        function applyXP(uid) {
            const curInput = document.getElementById(`cur-${uid}`);
            const newInput = document.getElementById(`new-${uid}`);
            
            const currentVal = parseInt(curInput.value) || 0;
            const addVal = parseInt(newInput.value) || 0;

            if (addVal === 0) return;

            curInput.value = currentVal + addVal;
            newInput.value = "";

            curInput.classList.remove("flash-effect");
            void curInput.offsetWidth;
            curInput.classList.add("flash-effect");

            updateCard(uid);
        }

        function checkEnter(e, uid) {
            if (e.key === "Enter") applyXP(uid);
        }

        // === LOGICA DE LEVEL UP AUTOMATICO ===
        function confirmLevelUp(uid, name) {
            const lvlEl = document.getElementById(`lvl-${uid}`);
            const currentLevel = parseInt(lvlEl.innerText);

            if(currentLevel >= 50) {
                showAlert("Aviso", "Nível Máximo Alcançado!");
                return;
            }

            showConfirm("Level Up", `Deseja elevar ${name} para o Nível ${currentLevel + 1}? O XP será ajustado para o mínimo necessário deste nível.`, () => {
                performLevelUp(uid, currentLevel + 1);
            });
        }

        function performLevelUp(uid, targetLevel) {
            const targetEntry = xpTable.find(x => x.l === targetLevel);
            if (!targetEntry) return;

            const { mult: finalFactor } = getAptitudeMultiplier(uid);
            const reqXP = Math.floor(targetEntry.x * finalFactor);

            // Atualizar Input
            const curInput = document.getElementById(`cur-${uid}`);
            curInput.value = reqXP;

            // Efeito Visual
            curInput.classList.remove("flash-effect");
            void curInput.offsetWidth;
            curInput.classList.add("flash-effect");

            // Rodar atualização completa
            updateCard(uid);
        }

        function updateCard(uid, isPreview = false, skipSave = false) {
            const card = document.getElementById(`cur-${uid}`).closest('.apt-card');
            const itemData = JSON.parse(card.dataset.meta);

            const curVal = parseInt(document.getElementById(`cur-${uid}`).value) || 0;

            let total = curVal;
            if (isPreview) {
                total += (parseInt(document.getElementById(`new-${uid}`).value) || 0);
            }

            // Fator multiplicador derivado das particularidades/características
            const { mult: finalFactor, tags } = getAptitudeMultiplier(uid);

            // Atualiza tags de modificadores no card
            const modsEl = document.getElementById(`mods-${uid}`);
            if (modsEl) {
                modsEl.innerHTML = '';
                card.classList.remove('buffed', 'nerfed');
                if (finalFactor < 1) card.classList.add('buffed');
                else if (finalFactor > 1) card.classList.add('nerfed');
                tags.forEach(t => {
                    const span = document.createElement('span');
                    span.className = `mod-tag ${t.cls}`;
                    span.textContent = t.txt;
                    modsEl.appendChild(span);
                });
            }

            // Cálculo do Nível com Modificadores
            let level = 0;
            let nextXP = Math.floor(200 * finalFactor); 
            let prevXP = 0;

            for(let i = 0; i < xpTable.length; i++) {
                // Ajusta o requisito da tabela com o fator final
                const reqXP = Math.floor(xpTable[i].x * finalFactor);
                
                if(total >= reqXP) {
                    level = xpTable[i].l;
                    prevXP = reqXP;
                    
                    if(i + 1 < xpTable.length) {
                        nextXP = Math.floor(xpTable[i+1].x * finalFactor);
                    } else {
                        nextXP = null;
                    }
                } else {
                    if(level === 0) nextXP = reqXP;
                    break;
                }
            }

            // Update UI
            document.getElementById(`lvl-${uid}`).innerText = level;

            const nextEl = document.getElementById(`next-${uid}`);
            const barEl = document.getElementById(`bar-${uid}`);

            if (nextXP !== null) {
                const missing = nextXP - total;
                nextEl.innerText = `Faltam: ${missing.toLocaleString()} XP`;
                
                const range = nextXP - prevXP;
                const gainedInLevel = total - prevXP;
                let pct = 0;
                if (range > 0) pct = (gainedInLevel/range)*100;
                
                pct = Math.min(100, Math.max(0, pct));
                barEl.style.width = pct + "%";
            } else {
                nextEl.innerText = "Nível Máximo Alcançado";
                barEl.style.width = "100%";
            }

            // Update Bonus
            const bonusEl = document.getElementById(`bonus-${uid}`);
            let bonusText = "";

            if (itemData.special) {
                if (itemData.special === 'pactos') bonusText = `+${Math.floor(level/10)} Efeitos`;
                else if (itemData.special === 'recursos') bonusText = `+${Math.floor(level/5)} Rec.`;
                else if (itemData.special === 'rct') bonusText = `Cura ${level*50} / Dano ${level*100}`;
            } else {
                let val = level * itemData.m;
                if(val % 1 !== 0) val = val.toFixed(1).replace('.', ',');
                bonusText = `+${val} ${itemData.u || ''}`;
            }
            bonusEl.innerText = bonusText;

            if(!isPreview) {
                updateGlobalTotal();
                if(!skipSave) saveData();
            }
        }

        function updateGlobalTotal() {
            const inputs = document.querySelectorAll('.input-current');
            let total = 0;
            inputs.forEach(inp => total += (parseInt(inp.value) || 0));
            document.getElementById('globalTotal').innerText = total.toLocaleString('pt-BR');
        }

    </script>
</body>
</html>
